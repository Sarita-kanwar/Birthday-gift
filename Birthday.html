<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎉 Happy Birthday 🎂</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<!-- Confetti Library -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4,#fbc2eb,#a18cd1);
    background-size:300% 300%;
    animation:bgMove 10s ease infinite;
}

@keyframes bgMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.card{
    width:90%;
    max-width:420px;
    background:rgba(255,255,255,.18);
    backdrop-filter:blur(15px);
    border-radius:25px;
    padding:30px;
    text-align:center;
    color:white;
    box-shadow:0 10px 30px rgba(0,0,0,.25);
}

h1{
    font-size:2.3rem;
    margin-bottom:10px;
}

h2{
    font-size:1.5rem;
    margin-bottom:15px;
}

p{
    line-height:1.7;
    font-size:1rem;
    margin-bottom:25px;
}

button{
    background:#fff;
    color:#ff4081;
    border:none;
    padding:14px 30px;
    border-radius:50px;
    font-size:1rem;
    cursor:pointer;
    font-weight:bold;
    transition:.3s;
}

button:hover{
    transform:scale(1.08);
}

.balloon{
    position:absolute;
    bottom:-120px;
    width:50px;
    height:65px;
    border-radius:50%;
    animation:float 12s linear infinite;
    opacity:.9;
}

.balloon::after{
    content:'';
    position:absolute;
    width:2px;
    height:80px;
    background:white;
    left:50%;
    top:60px;
}

@keyframes float{
    from{
        transform:translateY(0);
    }
    to{
        transform:translateY(-120vh);
    }
}

@media(max-width:480px){

    h1{
        font-size:1.9rem;
    }

    h2{
        font-size:1.3rem;
    }

    p{
        font-size:.95rem;
    }

    button{
        width:100%;
    }
}
</style>
</head>

<body>

<div class="card">
    <h1>🎂 Happy Birthday! 🎉</h1>

    <h2>  Dear GP ❤️</h2>

    <p>
        Wishing you a day filled with happiness,
        laughter, love, and unforgettable memories.
        May all your dreams come true and your year
        be full of success and joy!
        Zindagi ka GPS kharab bhi ho jaye but shi se support krke mind ka GPS jarur shi kr diya 

    </p>

    <button onclick="celebrate()">
        🎊 Celebrate!
    </button>
</div>

<script>
// Balloons
const colors=[
"#ff4d6d",
"#4dabf7",
"#ffd43b",
"#69db7c",
"#9775fa",
"#ff922b"
];

for(let i=0;i<18;i++){

    const b=document.createElement("div");

    b.className="balloon";

    b.style.left=Math.random()*100+"vw";

    b.style.background=colors[Math.floor(Math.random()*colors.length)];

    b.style.animationDuration=(8+Math.random()*6)+"s";

    b.style.animationDelay=Math.random()*5+"s";

    document.body.appendChild(b);
}

// Initial Confetti
function fireConfetti(){

confetti({
particleCount:180,
spread:180,
origin:{y:0.6}
});

confetti({
particleCount:120,
angle:60,
spread:90,
origin:{x:0}
});

confetti({
particleCount:120,
angle:120,
spread:90,
origin:{x:1}
});

}

window.onload=()=>{

fireConfetti();

setInterval(()=>{
confetti({
particleCount:20,
spread:80,
origin:{
x:Math.random(),
y:Math.random()-0.2
}
});
},1800);

}

// Button
function celebrate(){

fireConfetti();

const duration=4000;
const animationEnd=Date.now()+duration;

(function frame(){

confetti({
particleCount:6,
angle:60,
spread:70,
origin:{x:0}
});

confetti({
particleCount:6,
angle:120,
spread:70,
origin:{x:1}
});

if(Date.now()<animationEnd){
requestAnimationFrame(frame);
}

})();
}
</script>

</body>
</html>
